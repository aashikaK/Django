<html>
<head>
    <title>Navbar Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, #4b6cb7, #182848);
            padding: 12px 25px;
            color: white;
        }

        /* Left side (search) */
        .search-box {
            display: flex;
            align-items: center;
        }

        .search-box input {
            padding: 7px 10px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        .search-box button {
            margin-left: 5px;
            padding: 7px 12px;
            border: none;
            border-radius: 5px;
            background: white;
            color: #182848;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-box button:hover {
            background: #ddd;
        }

        /* Center logo */
        .logo {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Right side links */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 15px;
            margin: 0;
            padding: 0;
        }

        .nav-links li a {
            text-decoration: none;
            color: white;
            padding: 7px 10px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .nav-links li a:hover {
            background: white;
            color: #182848;
        }
    </style>
</head>

<body>

    <div class="navbar">

        <!-- Left: Search -->
        <div class="search-box">
            <input type="text" placeholder="Search...">
            <button>Go</button>
        </div>

        <!-- Center: Logo -->
        <div class="logo">MySite</div>

        <!-- Right: Links -->
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

    </div>

</body>
</html>
