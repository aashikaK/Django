<html>
<head>
   <title>
        {% block title %}My site{% endblock %}
    </title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, #4b6cb7, #182848);
            padding: 12px 25px;
            color: white;
        }

        /* Left side (search) */
        .search-box {
            display: flex;
            align-items: center;
        }

        .search-box input {
            padding: 7px 10px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        .search-box button {
            margin-left: 5px;
            padding: 7px 12px;
            border: none;
            border-radius: 5px;
            background: white;
            color: #182848;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-box button:hover {
            background: #ddd;
        }

        /* Center logo */
        .logo {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Right side links */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 15px;
            margin: 0;
            padding: 0;
        }

        .nav-links li a {
            text-decoration: none;
            color: white;
            padding: 7px 10px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .nav-links li a:hover {
            background: white;
            color: #182848;
        }

        /* Dropdown container */
        .dropdown {
            position: relative;
        }

        /* Hide dropdown menu initially */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 30px;
            left: 0;
            background: white;
            list-style: none;
            padding: 0;
            margin: 0;
            border-radius: 5px;
            min-width: 160px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);

            margin-top: -5px;
    padding-top: 5px;
        }

        /* ✅ Show dropdown on hover via CSS */
        .dropdown:hover .dropdown-menu {
            display: block;
        }

        /* Dropdown items */
        .dropdown-menu li a {
            display: block;
            padding: 10px;
            color: #182848;
            text-decoration: none;
        }

        /* Hover effect */
        .dropdown-menu li a:hover {
            background: #f1f1f1;
        }
        body {
    background: linear-gradient(-45deg, #eef2f3, #d9e4f5, #eef2f3);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
   
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}
    </style>
</head>

<body>

    <div class="navbar">

        <!-- Left: Search -->
        <div class="search-box">
            <input type="text" placeholder="Search...">
            <button>Go</button>
        </div>

        <!-- Center: Logo -->
        <div class="logo">MySite</div>

        <!-- Right: Links -->
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>

            {% comment %} services section {% endcomment %}
            <li class="dropdown">
                <!-- ✅ Only change: removed onclick, now navigates directly to /services on click -->
                <a href="/services">Services ▼</a>
                <ul class="dropdown-menu" id="dropdownMenu">
                    <li><a href="/services/web">Web Development</a></li>
                    <li><a href="/services/app">App Development</a></li>
                    <li><a href="/services/design">UI/UX Design</a></li>
                </ul>
            </li>

            <li><a href="/contacts">Contact Us</a></li>
        </ul>

    </div>

    {% block content %}{% endblock content %}

    <script>
        // close dropdown when clicking outside (kept for safety)
        window.onclick = function(e) {
            if (!e.target.matches('.dropdown a')) {
                let menu = document.getElementById("dropdownMenu");
                if (menu) {
                    menu.style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
